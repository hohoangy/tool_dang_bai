services:
  server:
    build:
      context: ./server
    container_name: ai-social-server
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: ${DATABASE_URL}

  client:
    build:
      context: ./client
    container_name: ai-social-client
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - server
    environment:
      VITE_API_URL: http://localhost:5000/api
